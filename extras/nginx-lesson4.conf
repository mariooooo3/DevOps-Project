# ============================================================
# nginx.conf - Sesiunea 4
# Reverse Proxy + Load Balancer pentru Spring Boot
# ============================================================

upstream springboot_cluster {
    # Load balancing round-robin (default)
    server springboot-1:8080;
    server springboot-2:8080;

    # Optiuni avansate:
    # least_conn;  # trimite la cel mai putin ocupat server
    # ip_hash;     # acelasi client merge mereu la acelasi server
}

server {
    listen 80;
    server_name app.fiipractic.lan;

    # ---- Reverse Proxy + Load Balancer ----
    location / {
        proxy_pass         http://springboot_cluster;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ---- Health check endpoint ----
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
