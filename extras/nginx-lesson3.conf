# ============================================================
# nginx.conf - Lectia 3
# HTTP Security Headers + Pagina de mentenanta
# ============================================================

server {
    listen 80;
    server_name app.fiipractic.lan;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.fiipractic.lan;

    ssl_certificate     /etc/nginx/ssl/app.fiipractic.lan.crt;
    ssl_certificate_key /etc/nginx/ssl/app.fiipractic.lan.key;

    # ---- HTTP Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ---- Pagina de mentenanta ----
    # Pentru a activa mentenanta: touch /etc/nginx/maintenance.on
    # Pentru a dezactiva:         rm /etc/nginx/maintenance.on
    set $maintenance 0;
    if (-f /etc/nginx/maintenance.on) {
        set $maintenance 1;
    }
    if ($maintenance = 1) {
        return 503;
    }

    error_page 503 /maintenance.html;
    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ---- Proxy catre aplicatia Spring Boot ----
    location / {
        proxy_pass         http://localhost:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
